{% extends 'base.html' %}
{% block title %}Register — PhishGuard{% endblock %}
{% block content %}
<div class="auth-box">
  <div style="text-align:center; margin-bottom:24px;">
    <div style="font-size:2.5rem; margin-bottom:8px;">🔐</div>
    <h2>Create Account</h2>
    <p class="sub">Join PhishGuard — it's completely free</p>
  </div>
  <form method="POST" action="/auth/register">
    <input type="hidden" name="csrf_token" value="{{ session.get('csrf_token', '') }}">
    <div class="form-group">
      <label class="form-label">Full Name</label>
      <input type="text" name="name" class="form-control" placeholder="Your full name" required maxlength="100">
    </div>
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" name="email" class="form-control" placeholder="you@email.com" required>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" placeholder="Minimum 6 characters" required minlength="6">
    </div>
    <button type="submit" class="btn btn-primary w-full" style="margin-top:6px;">Create Account →</button>
  </form>
  <p class="mt-2 text-center text-muted" style="font-size:0.85rem;">
    Already have an account? <a href="/auth/login">Sign in</a>
  </p>
</div>
{% endblock %}
