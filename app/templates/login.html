{% extends 'base.html' %}
{% block title %}Login — PhishGuard{% endblock %}
{% block content %}
<div class="auth-box">
  <div style="text-align:center; margin-bottom:24px;">
    <h2>Welcome Back</h2>
    <p class="sub">Sign in to your PhishGuard account</p>
  </div>
  <form method="POST" action="/auth/login">
    <input type="hidden" name="csrf_token" value="{{ session.get('csrf_token', '') }}">
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" name="email" class="form-control" placeholder="you@email.com" required>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
    </div>
    <button type="submit" class="btn btn-primary w-full" style="margin-top:6px;">Sign In</button>
  </form>
  <p class="mt-2 text-center text-muted" style="font-size:0.85rem;">
    No account? <a href="/auth/register">Register for free</a>
  </p>
</div>
{% endblock %}
