{% extends 'base.html' %}
{% block title %}Edit User — PhishGuard{% endblock %}
{% block content %}
<div style="max-width:500px; margin:0 auto;">
  <div class="page-header">
    <h1>Edit User</h1>
    <a href="/auth/dashboard" class="btn btn-secondary">Back</a>
  </div>
  <div class="card">
    <form method="POST" action="/auth/edit/{{ user.id }}">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" name="name" class="form-control" value="{{ user.name }}" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" value="{{ user.email }}" required>
      </div>
      <div class="form-group">
        <label class="form-label">New Password <span class="text-muted">(leave blank to keep current)</span></label>
        <input type="password" name="password" class="form-control" placeholder="New password">
      </div>
      <button type="submit" class="btn btn-primary">Update User</button>
      <a href="/auth/dashboard" class="btn btn-secondary" style="margin-left:8px;">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
