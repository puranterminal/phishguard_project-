{% extends 'base.html' %}
{% block title %}My Profile — PhishGuard{% endblock %}
{% block content %}
<div style="max-width:520px; margin:0 auto;">
  <div class="page-header">
    <h1>👤 My Profile</h1>
  </div>
  <div class="card">
    <form method="POST" action="/auth/profile">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" name="name" class="form-control" value="{{ user.name }}" required maxlength="100">
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" value="{{ user.email }}" required>
      </div>
      <div style="border-top:1px solid #e2e8f0; margin:16px 0; padding-top:16px;">
        <p class="text-muted mb-2" style="font-size:0.82rem;">Leave password fields empty to keep your current password.</p>
        <div class="form-group">
          <label class="form-label">Current Password</label>
          <input type="password" name="current_password" class="form-control" placeholder="Required to change password">
        </div>
        <div class="form-group">
          <label class="form-label">New Password</label>
          <input type="password" name="new_password" class="form-control" placeholder="Minimum 6 characters">
        </div>
      </div>
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="/" class="btn btn-secondary" style="margin-left:8px;">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
